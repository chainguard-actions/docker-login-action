name: Test Docker Login with ecr and scope inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          registry: 123456789012.dkr.ecr.us-east-1.amazonaws.com
          ecr: 'true'
          scope: 'test-scope'
          username: testuser
          password: testpassword
          logout: 'false'
      - name: Assert action ran (auth failure is expected with fake credentials)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
