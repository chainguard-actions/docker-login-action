name: Test Docker Login with registry-auth input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          registry-auth: |
            - registry: registry.example.com
              username: testuser
              password: testpassword
          logout: 'false'
      - name: Assert action ran (auth failure is expected with fake credentials)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
