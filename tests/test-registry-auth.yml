name: Test registry-auth input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          registry-auth: |
            - registry: ghcr.io
              username: testuser
              password: testpassword
          logout: 'true'
        continue-on-error: true
      - name: Assert action ran with registry-auth input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to invalid credentials in test environment,
          # but we verify the step was invoked with the registry-auth input.
          if [ "${{ steps.action.outcome }}" = "" ]; then
            echo "FAIL: action did not run at all"
            exit 1
          fi
          echo "PASS: action ran with registry-auth input (outcome: ${{ steps.action.outcome }})"
