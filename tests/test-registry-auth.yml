name: Test Docker Login with Registry Auth
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Login with registry-auth parameter
        id: login
        uses: .
        with:
          registry-auth: |
            - registry: ghcr.io
              username: testuser
              password: testpassword
          logout: 'false'
        continue-on-error: true
      - name: Assert action ran with registry-auth parameter
        run: |
          echo "Login step outcome: ${{ steps.login.outcome }}"
          if [ "${{ steps.login.outcome }}" = "skipped" ]; then
            echo "FAIL: step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: login step with registry-auth completed (outcome: ${{ steps.login.outcome }})"
