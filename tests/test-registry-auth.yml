name: Test registry-auth input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          registry-auth: |
            - registry: ghcr.io
              username: testuser
              password: testpassword
          logout: 'true'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to invalid credentials, but it should at least
          # attempt to authenticate (not fail due to unrecognized input)
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with registry-auth input"
