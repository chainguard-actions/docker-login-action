name: Test Docker logout behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: login
        uses: .
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: 'true'

      - name: Assert login step completed
        run: |
          echo "Login action completed successfully with logout=true"
          echo "PASS"
