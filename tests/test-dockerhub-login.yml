name: Test Docker Login (Local Registry)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          sleep 2
      - name: Login to local registry
        id: login
        uses: .
        with:
          registry: localhost:5000
          username: testuser
          password: testpassword
          logout: 'false'
      - name: Assert login step completed
        run: |
          echo "Docker login step completed successfully"
          if [ -f "$HOME/.docker/config.json" ]; then
            echo "Docker config exists"
            cat "$HOME/.docker/config.json"
            if grep -q "localhost:5000" "$HOME/.docker/config.json"; then
              echo "PASS: localhost:5000 found in docker config"
            else
              echo "FAIL: localhost:5000 not found in docker config"
              exit 1
            fi
          else
            echo "FAIL: Docker config not found"
            exit 1
          fi
