name: Test Docker Hub Login
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up fake Docker Hub credentials
        run: |
          # We'll test with a registry that doesn't require real credentials
          # by using a local registry instead
          echo "Setting up test environment"
      - name: Start local Docker registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          sleep 2
          echo "Local registry started"
      - id: action
        uses: .
        with:
          registry: localhost:5000
          username: testuser
          password: testpassword
          logout: 'true'
      - name: Assert login succeeded
        run: |
          echo "Checking Docker config for registry credentials"
          if ! cat ~/.docker/config.json | grep -q "localhost:5000"; then
            echo "FAIL: expected localhost:5000 to be in Docker config"
            exit 1
          fi
          echo "PASS: registry credentials found in Docker config"
      - name: Cleanup
        if: always()
        run: |
          docker stop registry || true
          docker rm registry || true
