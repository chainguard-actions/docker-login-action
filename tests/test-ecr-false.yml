name: Test Docker Login with ECR Disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Start local Docker registry
        run: |
          docker run -d -p 5002:5000 --name registry-ecr-false registry:2
          sleep 2
          echo "Local registry started on port 5002"
      - id: action
        uses: .
        with:
          registry: localhost:5002
          username: testuser
          password: testpassword
          ecr: 'false'
          logout: 'true'
      - name: Assert login succeeded with ecr=false
        run: |
          echo "Checking Docker config for registry credentials"
          if ! cat ~/.docker/config.json | grep -q "localhost:5002"; then
            echo "FAIL: expected localhost:5002 to be in Docker config"
            exit 1
          fi
          echo "PASS: registry credentials found in Docker config with ecr=false"
      - name: Cleanup
        if: always()
        run: |
          docker stop registry-ecr-false || true
          docker rm registry-ecr-false || true
