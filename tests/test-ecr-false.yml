name: Test Docker login with ECR disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: login
        uses: .
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          ecr: 'false'
          logout: 'false'

      - name: Assert login with ECR=false succeeded
        run: |
          echo "Login action with ecr=false completed successfully"
          echo "PASS"
