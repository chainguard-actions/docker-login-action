name: Test Docker Login with ECR Disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Login with ECR explicitly disabled
        id: login
        uses: .
        with:
          registry: ghcr.io
          username: testuser
          password: testpassword
          ecr: 'false'
          logout: 'false'
        continue-on-error: true
      - name: Assert action ran with ecr=false
        run: |
          echo "Login step outcome: ${{ steps.login.outcome }}"
          if [ "${{ steps.login.outcome }}" = "skipped" ]; then
            echo "FAIL: step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: login step with ecr=false completed (outcome: ${{ steps.login.outcome }})"
